apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
spec:
  destination:
    namespace: openshift-gitops
    server: 'https://kubernetes.default.svc'
  project: default
  source: 
    path: gitops/applications
    repoURL: 'https://github.com/davidseve/llama-stack-example.git'
    targetRevision: gemini
    helm:
      valueFiles:
      - ../values-common.yaml
      values: |  
        applications:
          rhoai:
            enabled: true
          discounts:
            enabled: true
          inference:
            enabled: false
          kubernetesMcp:
            enabled: true
          llamaStack:
            enabled: true
          milvus:
            enabled: true
          minio:
            enabled: true
          postgres:
            enabled: true 
          dspa:
            enabled: true
        providers:
          kubeflow:
            enabled: true
            # Internal service URL - pipeline pods connect via cluster network (no SSL needed)
            llamaStackUrl: "http://llama-stack-example-service.llama-stack-example.svc.cluster.local:8321"     
        secret:
          data:
            LLAMA_4_SCOUT_API_TOKEN: ${LLAMA_4_SCOUT_API_TOKEN}
            OPENAI_API_KEY: ${GEMINI_API_KEY}
            KUBEFLOW_PIPELINES_TOKEN: ${KUBEFLOW_PIPELINES_TOKEN}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
