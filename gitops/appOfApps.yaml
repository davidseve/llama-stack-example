apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
spec:
  destination:
    namespace: openshift-gitops
    server: 'https://kubernetes.default.svc'
  project: default
  source: 
    path: gitops/applications
    repoURL: 'https://github.com/davidseve/llama-stack-example.git'
    targetRevision: HEAD
    helm:
      valueFiles:
      - ../values-common.yaml
      values: |  
        global:
          targetRevision: HEAD
        applications:
          rhoai:
            enabled: true
          discounts:
            enabled: true
          inference:
            enabled: false
          inferenceCpu:
            enabled: true
          kubernetesMcp:
            enabled: true
          argocdMcp:
            enabled: true
          llamaStack:
            enabled: true
          milvus:
            enabled: true
          minio:
            enabled: true
          postgres:
            enabled: true 
          dspa:
            enabled: true
          operators:
            enabled: true
            grafana: true
            tempo: true
            opentelemetry: true
            uwm: true
          otelCollector:
            enabled: true
          tempo:
            enabled: true
          grafana:
            enabled: true
        providers:
          kubeflow:
            enabled: false
            llamaStackUrl: "https://llama-stack-example-llama-stack-example.apps.ocp.sandbox1467.opentlc.com"     
          telemetry:
            enabled: true
        secret:
          data:
            LLAMA_4_SCOUT_API_TOKEN: ${LLAMA_4_SCOUT_API_TOKEN}
            GRANITE_GUARDIAN_API_TOKEN: ${GRANITE_GUARDIAN_API_TOKEN}
            KUBEFLOW_PIPELINES_TOKEN: ${KUBEFLOW_PIPELINES_TOKEN}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
