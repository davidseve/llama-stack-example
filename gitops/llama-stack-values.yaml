# ConfigMap configuration
config:
  enable: true
  file: conf/default-run.yaml

# vLLM Provider configuration
providers:
  vllm:
    llama-4-scout:
      modelId: "llama-4-scout-17b-16e-w4a16"  # Must match actual model name on vLLM server
      providerModelId: "llama-4-scout-17b-16e-w4a16"
      url: "https://llama-4-scout-17b-16e-w4a16-maas-apicast-production.apps.prod.rhoai.rh-aiservices-bu.com:443/v1"
      maxTokens: "4096"
      tlsVerify: "false"
      apiTokenSecret: "LLAMA_4_SCOUT_API_TOKEN"
  
  # RAGAS Provider for RAG evaluation metrics (v0.6.0+)
  ragas:
    embeddingModel: "sentence-transformers/ibm-granite/granite-embedding-125m-english"
  postgres:
    enabled: true
    host: "postgres.llama-stack-example.svc.cluster.local"
    port: "5432"
    secretName: "postgres-secret"  # K8s secret containing POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD

   
  # Kubeflow/DSPA configuration for ragas-remote (provider v0.6.0+)
  # Ref: https://github.com/trustyai-explainability/llama-stack-provider-ragas
  kubeflow:
    enabled: true
    # Internal service URL - pipeline pods reach Llama Stack via cluster DNS
    llamaStackUrl: "http://llama-stack-example-service.llama-stack-example.svc.cluster.local:8321"
    resultsS3Prefix: "s3://mlpipeline/ragas-results"
    resultsS3Endpoint: "http://minio.data-science-project.svc.cluster.local:9000"
    resultsS3PathStyle: true
    s3CredentialsSecretName: "minio-credentials"
    # Internal service URL for DSPA (HTTP - podToPodTLS disabled in DSPA)
    pipelinesEndpoint: "http://ds-pipeline-dspa.data-science-project.svc.cluster.local:8888"
    namespace: "data-science-project"
    baseImage: "registry.access.redhat.com/ubi9/python-312:latest"
    sslVerify: false

# MCP Server endpoints
mcpServers:
  openshift:
    uri: "http://kubernetes-mcp-kubernetes-mcp-server.llama-stack-example.svc.cluster.local:8080/sse"

server:
  distribution:
    image: docker.io/llamastack/distribution-starter:0.5.1
