{{- if .Values.serviceAccount.create -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "argocd-mcp.serviceAccountName" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "argocd-mcp.labels" . | nindent 4 }}
{{- end }}
---
{{/* Setup Job ServiceAccount - needs cross-namespace access */}}
{{- if .Values.setupJob.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "argocd-mcp.fullname" . }}-setup
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "argocd-mcp.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "argocd-mcp.fullname" . }}-setup
  labels:
    {{- include "argocd-mcp.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
rules:
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "argocd-mcp.fullname" . }}-setup
  labels:
    {{- include "argocd-mcp.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
subjects:
  - kind: ServiceAccount
    name: {{ include "argocd-mcp.fullname" . }}-setup
    namespace: {{ .Values.global.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "argocd-mcp.fullname" . }}-setup
{{- end }}
