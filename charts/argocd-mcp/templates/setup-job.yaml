{{- if .Values.setupJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "argocd-mcp.fullname" . }}-setup
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "argocd-mcp.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "0"
spec:
  backoffLimit: {{ .Values.setupJob.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "argocd-mcp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: setup
    spec:
      serviceAccountName: {{ include "argocd-mcp.fullname" . }}-setup
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: {{ .Values.setupJob.image }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail

              ARGOCD_NS="{{ .Values.argocd.namespace }}"
              CREDS_SECRET="{{ .Values.argocd.credentialsSecret }}"
              TARGET_NS="{{ .Values.global.namespace }}"

              # Route candidates: user-configured first, then common defaults (deduplicated)
              ROUTE_CANDIDATES=$(echo "{{ .Values.argocd.routeName }} openshift-gitops-server argocd-server" | tr ' ' '\n' | awk '!seen[$0]++' | tr '\n' ' ')
              # Secret candidates: user-configured first, then common defaults (deduplicated)
              SECRET_CANDIDATES=$(echo "{{ .Values.argocd.secretName }} openshift-gitops-cluster argocd-cluster argocd-initial-admin-secret" | tr ' ' '\n' | awk '!seen[$0]++' | tr '\n' ' ')

              echo "Discovering ArgoCD server URL in namespace ${ARGOCD_NS}..."
              ARGOCD_HOST=""
              for ROUTE_NAME in ${ROUTE_CANDIDATES}; do
                ARGOCD_HOST=$(oc get route "${ROUTE_NAME}" -n "${ARGOCD_NS}" -o jsonpath='{.spec.host}' 2>/dev/null) || true
                if [ -n "${ARGOCD_HOST}" ]; then
                  echo "  Found route: ${ROUTE_NAME}"
                  break
                fi
              done
              if [ -z "${ARGOCD_HOST}" ]; then
                echo "ERROR: No ArgoCD route found. Tried: ${ROUTE_CANDIDATES}"
                exit 1
              fi
              ARGOCD_URL="https://${ARGOCD_HOST}"
              echo "ArgoCD URL: ${ARGOCD_URL}"

              echo "Discovering admin password secret in ${ARGOCD_NS}..."
              ADMIN_PASSWORD=""
              for SECRET_NAME in ${SECRET_CANDIDATES}; do
                ADMIN_PASSWORD=$(oc get secret "${SECRET_NAME}" -n "${ARGOCD_NS}" -o jsonpath='{.data.admin\.password}' 2>/dev/null | base64 -d 2>/dev/null) || true
                if [ -n "${ADMIN_PASSWORD}" ]; then
                  echo "  Found secret: ${SECRET_NAME}"
                  break
                fi
              done
              if [ -z "${ADMIN_PASSWORD}" ]; then
                echo "ERROR: No admin password secret found. Tried: ${SECRET_CANDIDATES}"
                exit 1
              fi

              echo "Authenticating with ArgoCD API..."
              RESPONSE=$(curl -sk "${ARGOCD_URL}/api/v1/session" \
                -H "Content-Type: application/json" \
                -d "{\"username\":\"admin\",\"password\":\"${ADMIN_PASSWORD}\"}")
              SESSION_TOKEN=$(echo "${RESPONSE}" | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")

              echo "Attempting to generate long-lived API token..."
              TOKEN_RESPONSE=$(curl -sk "${ARGOCD_URL}/api/v1/account/admin/token" \
                -H "Authorization: Bearer ${SESSION_TOKEN}" \
                -H "Content-Type: application/json" \
                -X POST -d '{"expiresIn": 0}')

              API_TOKEN=$(echo "${TOKEN_RESPONSE}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('token',''))" 2>/dev/null || echo "")

              if [ -z "${API_TOKEN}" ]; then
                echo "apiKey capability not available, using session token instead."
                API_TOKEN="${SESSION_TOKEN}"
              fi

              echo "Creating credentials secret ${CREDS_SECRET} in ${TARGET_NS}..."
              oc create secret generic "${CREDS_SECRET}" \
                --from-literal=ARGOCD_BASE_URL="${ARGOCD_URL}" \
                --from-literal=ARGOCD_API_TOKEN="${API_TOKEN}" \
                -n "${TARGET_NS}" \
                --dry-run=client -o yaml | oc apply -f -

              echo "Setup complete."
{{- end }}
