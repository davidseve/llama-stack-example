{{- if .Values.setupJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "argocd-mcp.fullname" . }}-setup
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "argocd-mcp.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "0"
spec:
  backoffLimit: {{ .Values.setupJob.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "argocd-mcp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: setup
    spec:
      serviceAccountName: {{ include "argocd-mcp.fullname" . }}-setup
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: {{ .Values.setupJob.image }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail

              ARGOCD_NS="{{ .Values.argocd.namespace }}"
              ROUTE_NAME="{{ .Values.argocd.routeName }}"
              SECRET_NAME="{{ .Values.argocd.secretName }}"
              CREDS_SECRET="{{ .Values.argocd.credentialsSecret }}"
              TARGET_NS="{{ .Values.global.namespace }}"

              echo "Discovering ArgoCD server URL from route ${ROUTE_NAME} in ${ARGOCD_NS}..."
              ARGOCD_HOST=$(oc get route "${ROUTE_NAME}" -n "${ARGOCD_NS}" -o jsonpath='{.spec.host}')
              ARGOCD_URL="https://${ARGOCD_HOST}"
              echo "ArgoCD URL: ${ARGOCD_URL}"

              echo "Reading admin password from secret ${SECRET_NAME}..."
              ADMIN_PASSWORD=$(oc get secret "${SECRET_NAME}" -n "${ARGOCD_NS}" -o jsonpath='{.data.admin\.password}' | base64 -d)

              echo "Authenticating with ArgoCD API..."
              RESPONSE=$(curl -sk "${ARGOCD_URL}/api/v1/session" \
                -H "Content-Type: application/json" \
                -d "{\"username\":\"admin\",\"password\":\"${ADMIN_PASSWORD}\"}")
              SESSION_TOKEN=$(echo "${RESPONSE}" | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")

              echo "Attempting to generate long-lived API token..."
              TOKEN_RESPONSE=$(curl -sk "${ARGOCD_URL}/api/v1/account/admin/token" \
                -H "Authorization: Bearer ${SESSION_TOKEN}" \
                -H "Content-Type: application/json" \
                -X POST -d '{"expiresIn": 0}')

              API_TOKEN=$(echo "${TOKEN_RESPONSE}" | python3 -c "
import sys, json
data = json.load(sys.stdin)
if 'token' in data:
    print(data['token'])
else:
    print('')
" 2>/dev/null || echo "")

              if [ -z "${API_TOKEN}" ]; then
                echo "apiKey capability not available, using session token instead."
                API_TOKEN="${SESSION_TOKEN}"
              fi

              echo "Creating credentials secret ${CREDS_SECRET} in ${TARGET_NS}..."
              oc create secret generic "${CREDS_SECRET}" \
                --from-literal=ARGOCD_BASE_URL="${ARGOCD_URL}" \
                --from-literal=ARGOCD_API_TOKEN="${API_TOKEN}" \
                -n "${TARGET_NS}" \
                --dry-run=client -o yaml | oc apply -f -

              echo "Setup complete."
{{- end }}
