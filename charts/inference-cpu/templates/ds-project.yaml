{{- if .Values.project.autocreate }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.global.namespace }}
  labels:
    kubernetes.io/metadata.name: {{ .Values.global.namespace }}
    opendatahub.io/dashboard: 'true'
  annotations:
    openshift.io/display-name: {{ .Values.global.namespace }}
spec:
  finalizers:
    - kubernetes
{{- end }}
