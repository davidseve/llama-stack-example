{{- if .Values.inferenceservice.enable }}
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  annotations:
    openshift.io/display-name: {{ .Values.global.name }}
    serving.kserve.io/deploymentMode: RawDeployment
  name: {{ .Values.global.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    opendatahub.io/dashboard: {{ .Values.global.labels.dashboard | quote }}
    networking.knative.dev/visibility: cluster-local
spec:
  predictor:
    maxReplicas: {{ .Values.inferenceservice.maxReplicas }}
    minReplicas: {{ .Values.inferenceservice.minReplicas }}
    model:
      modelFormat:
        name: vLLM
      name: ''
      resources:
        limits:
          cpu: {{ .Values.resources.limits.cpu | quote }}
          memory: {{ .Values.resources.limits.memory | quote }}
        requests:
          cpu: {{ .Values.resources.requests.cpu | quote }}
          memory: {{ .Values.resources.requests.memory | quote }}
      runtime: vllm-cpu
      storageUri: {{ .Values.model.storageUri | quote }}
{{- if .Values.inferenceservice.route.enable }}
---
kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: {{ .Values.global.name }}
  namespace: {{ .Values.global.namespace }}
spec:
  to:
    kind: Service
    name: {{ .Values.global.name }}-predictor
    weight: 100
  port:
    targetPort: http1
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: None
  wildcardPolicy: None
{{- end }}
{{- end }}
