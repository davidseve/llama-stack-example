---
apiVersion: tempo.grafana.com/v1alpha1
kind: TempoMonolithic
metadata:
  name: {{ .Values.tempo.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tempo.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  storage:
    traces:
      backend: {{ .Values.tempo.storage.backend }}
      size: {{ .Values.tempo.storage.size }}
  ingestion:
    otlp:
      grpc:
        enabled: {{ .Values.tempo.ingestion.otlp.grpc }}
      http:
        enabled: {{ .Values.tempo.ingestion.otlp.http }}
  jaegerui:
    enabled: {{ .Values.tempo.jaegerui.enabled }}
    {{- if .Values.tempo.jaegerui.route }}
    route:
      enabled: true
    {{- end }}
  extraConfig:
    tempo:
      compactor:
        compaction:
          block_retention: {{ .Values.tempo.retention }}
